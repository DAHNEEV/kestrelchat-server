name: kestrel

services:
  gateway:
    build:
      context: .
      dockerfile: crates/services/gateway/Dockerfile

    ports:
      - "5180:5180"

    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: crates/services/api/Dockerfile

    ports:
      - "5181:5181"

    restart: unless-stopped
