name: kestrel

services:
  server:
    build:
      context: .
      dockerfile: crates/app/Dockerfile
      args:
        BUILD_MODE: ${BUILD_MODE:-debug}

    volumes:
      - ./kestrel.toml:/var/kestrel/conf.toml:ro,z
    environment:
      - KESTREL_CONFIG=/var/kestrel/conf.toml

    ports:
      - "5187:5187"

    restart: unless-stopped

    profiles: ["prod", "dev"]

  postgres:
    image: postgres:18

    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: kestrel
      POSTGRES_PASSWORD: kestrel
      POSTGRES_DB: kestrel

    ports:
      - "5432:5432"

    restart: unless-stopped

    profiles: ["dev"]

  redis:
    image: redis:7-alpine

    command: ["redis-server", "--appendonly", "yes"]

    volumes:
      - redis_data:/data

    ports:
      - "6379:6379"

    restart: unless-stopped

    profiles: ["dev"]

volumes:
  postgres_data:
  redis_data:
