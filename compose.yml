name: kestrel

services:
  gateway:
    build:
      context: .
      dockerfile: crates/services/gateway/Dockerfile

    volumes:
      - ./kestrel.toml:/kestrel_dat/kestrel.toml:ro
    environment:
      - KESTREL_CONFIG=/kestrel_dat/kestrel.toml

    ports:
      - "5180:5180"

    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: crates/services/api/Dockerfile

    volumes:
      - ./kestrel.toml:/kestrel_dat/kestrel.toml:ro
    environment:
      - KESTREL_CONFIG=/kestrel_dat/kestrel.toml

    ports:
      - "5181:5181"

    restart: unless-stopped
