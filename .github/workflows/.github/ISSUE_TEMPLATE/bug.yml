name: Bug Report
description: Report something that isn’t working correctly
title: "bug: "
labels: ["bug", "status:needs-reproduction"]
projects: ["kestrelchat/5"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide as much detail as possible so it can be reproduced and fixed quickly.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the issue clearly.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: It should have...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps so the issue can be reproduced
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe issue
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, runtime versions, etc.
      placeholder: |
        OS:
        Version:
        Commit:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Errors
      description: Paste any relevant logs or stack traces
      render: shell
    validations:
      required: false
